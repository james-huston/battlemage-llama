# battlemage-llama — model manifest
#
# Single source of truth for which models we run and where each came from.
# Edit THIS file to add/remove models; it captures both the install source
# (so we can re-download / reproduce) and the llama-swap runtime params.
#
# The live serving config (config/llama-swap.yaml) can be (re)generated from
# the enabled entries here — see `scripts/apply-models.py` / `make models-apply`
# once that's wired up. config/llama-swap.example.yaml stays as human docs.
#
# Per-model fields
# ----------------
#   name       (required) llama-swap alias + OpenAI model id
#   enabled    default true; set false to keep a candidate documented but not
#              installed or served
#
#   Source — exactly ONE of:
#     path:    explicit container path of an already-present file or Ollama blob
#     repo: + file:   download <file> from this HF repo into MODELS_DIR
#       dir:   subdir under MODELS_DIR  (default: name)
#       out:   save-as filename         (default: basename of file)
#
#   Runtime (optional; defaults match the Battlemage config we already run)
#     ctx        default 131072   — cap dense 24B Mistral at 65536 (SYCL segfault)
#     template   jinja file in templates/  -> --chat-template-file /templates/<x>
#     reasoning  true -> --reasoning-format deepseek
#     temp, top_p, extra
#
#   Tracking / docs only
#     source     free-text note on where it came from
#     notes      tier, caveats, things to verify
#
#   LiteLLM metadata (pushed into model_info by `make sync-litellm`)
#     decode_tps   measured/estimated decode tok/s — drives the cost derivation
#     litellm:     model_info fields (description, supports_function_calling,
#                  supports_tool_choice, supports_reasoning, ...). mode=chat and
#                  supports_vision=false are defaulted; max_input_tokens from ctx.

# Cost model (electricity + hardware amortization). input/output_cost_per_token are
# DERIVED per model from decode_tps + these knobs, so changing a knob re-prices the
# whole fleet on the next `make sync-litellm`:
#   output $/token = watts/1000 * (1/decode_tps/3600) * usd_per_kwh * amortization
#   input  $/token = output / input_factor   (prefill is faster than decode)
cost:
  watts: 250          # GPU draw under inference load (Arc Pro B70 TBP ~250W)
  usd_per_kwh: 0.18   # electricity rate — adjust to your local price
  amortization: 3     # multiplier over raw electricity for GPU capital + wear
  input_factor: 4     # prefill ~4x faster than decode -> input costs 1/4 of output

